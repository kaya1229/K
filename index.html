<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KICKFLIP 3D Lightstick</title>
    <style>
        body { margin: 0; background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* 전체를 감싸는 컨테이너 */
        #lightstick-app {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 400px;
        }

        /* Three.js가 들어갈 영역 */
        #canvas-container {
            width: 300px;
            height: 300px;
            position: relative;
            z-index: 10;
        }

        /* 하단 손잡이 부분 */
        .handle-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -40px; /* 구체와 연결되도록 살짝 올림 */
            z-index: 5;
        }

        .connector { 
            width: 120px; height: 35px; 
            background-color: white; 
            background-image: linear-gradient(45deg, #000 25%, transparent 25%), linear-gradient(-45deg, #000 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #000 75%), linear-gradient(-45deg, transparent 75%, #000 75%); 
            background-size: 10px 10px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .handle { 
            width: 90px; height: 250px; 
            background: #1a1a1a; 
            border-radius: 0 0 45px 45px; 
            position: relative; 
            box-shadow: inset 10px 0 20px rgba(255,255,255,0.05); 
        }

        .button { 
            width: 20px; height: 20px; 
            background: #333; 
            border-radius: 50%; 
            position: absolute; top: 30px; left: 50%; 
            transform: translateX(-50%); 
            border: 1px solid #444; 
        }
    </style>
</head>
<body>

<div id="lightstick-app">
    <div id="canvas-container"></div>
    <div class="handle-section">
        <div class="connector"></div>
        <div class="handle">
            <div class="button"></div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // 페이지 로드 후 실행 보장
    window.onload = function() {
        const container = document.getElementById('canvas-container');
        const width = container.clientWidth;
        const height = container.clientHeight;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(width, height);
        container.appendChild(renderer.domElement);

        // 조명
        const light1 = new THREE.DirectionalLight(0xffffff, 1);
        light1.position.set(2, 2, 5);
        scene.add(light1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // 투명 구체
        const globe = new THREE.Mesh(
            new THREE.SphereGeometry(2, 32, 32),
            new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.3, shininess: 100 })
        );
        scene.add(globe);

        // 스케이트보드 그룹
        const boardGroup = new THREE.Group();
        const deck = new THREE.Mesh(
            new THREE.BoxGeometry(2.2, 0.1, 0.7),
            new THREE.MeshStandardMaterial({ color: 0x222222 })
        );
        boardGroup.add(deck);

        // 바퀴들
        const wheelGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.1, 12);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
        for(let i=0; i<4; i++) {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI/2;
            wheel.position.set(i<2 ? 0.7 : -0.7, -0.15, i%2 ? 0.2 : -0.2);
            boardGroup.add(wheel);
        }
        
        scene.add(boardGroup);

        // 하단 회색 웨이브 (이미지 참고)
        const wave = new THREE.Mesh(
            new THREE.TorusGeometry(1.5, 0.1, 16, 100),
            new THREE.MeshBasicMaterial({ color: 0xbbbbbb })
        );
        wave.rotation.x = Math.PI/2;
        wave.position.y = -1.2;
        scene.add(wave);

        camera.position.z = 7;

        let clock = 0;
        function animate() {
            requestAnimationFrame(animate);
            clock += 0.02;

            // 붕 떠오르는 효과
            boardGroup.position.y = Math.sin(clock) * 0.2 - 0.2;
            boardGroup.rotation.y += 0.01;
            
            renderer.render(scene, camera);
        }
        animate();
    };
</script>
</body>
</html>
