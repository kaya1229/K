<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KICKFLIP 3D FINAL</title>
    <style>
        body { 
    margin: 0; 
    background: rgba(0,0,0,0); /* 투명 배경 */
    overflow: hidden; 
}

/* 앱을 드래그해서 옮길 수 있도록 특정 영역 지정 */
#info {
    -webkit-app-region: drag; /* 이 부분을 잡고 앱 이동 가능 */
    cursor: grab;
    pointer-events: auto; 
}
        canvas { display: block; }
        #info { position: absolute; bottom: 8%; width: 100%; text-align: center; color: #aaa; font-size: 11px; pointer-events: none; font-family: sans-serif; }
    </style>
</head>
<body>

<div id="info">KICKFLIP OFFICIAL LIGHTSTICK CONCEPT</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, boardGroup, globe, handleGroup, waveOverlay;
    let clock = 0;

    init();
    animate();

    let mouseX = 0, mouseY = 0;
let targetRotationX = 0, targetRotationY = 0;

// 마우스 움직임 감지
window.addEventListener('mousemove', (e) => {
    // 화면 중앙을 기준으로 -1 ~ 1 사이 값 계산
    mouseX = (e.clientX / window.innerWidth) * 2 - 1;
    mouseY = (e.clientY / window.innerHeight) * 2 - 1;
});

// 클릭 시 '흔들기' 액션 (Kickflip 효과)
window.addEventListener('mousedown', () => {
    isKicking = true;
    setTimeout(() => isKicking = false, 500);
});

    function init() {
        scene = new THREE.Scene();
        
        // 1. 카메라 줌아웃: z값을 22로 늘려 전체가 여유 있게 보이도록 함
        camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, -1, 22); 

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(5, 10, 7.5);
        scene.add(mainLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        const lightstick = new THREE.Group();
        scene.add(lightstick);

        // 2. 투명 구체
        const globeGeo = new THREE.SphereGeometry(2.8, 64, 64);
        const globeMat = new THREE.MeshPhongMaterial({
            color: 0xffffff, transparent: true, opacity: 0.18, shininess: 120, specular: 0xffffff
        });
        globe = new THREE.Mesh(globeGeo, globeMat);
        globe.position.y = 4; 
        lightstick.add(globe);

        // 3. 구체 하단 물결 명암 (어두운 투명 오버레이)
        const waveGeo = new THREE.TorusGeometry(2.6, 0.15, 16, 100);
        const waveMat = new THREE.MeshBasicMaterial({ color: 0x222222, transparent: true, opacity: 0.2 });
        waveOverlay = new THREE.Mesh(waveGeo, waveMat);
        waveOverlay.position.y = 2.8; 
        waveOverlay.rotation.x = Math.PI / 2;
        lightstick.add(waveOverlay);

        // 4. 스케이트보드 (데크 너비 확장)
        boardGroup = new THREE.Group();
        
        // 데크 모양 설계
        const deckShape = new THREE.Shape();
        deckShape.moveTo(-1.8, 0);
        deckShape.quadraticCurveTo(0, -0.1, 1.8, 0);
        deckShape.lineTo(2.0, 0.4);
        deckShape.lineTo(1.8, 0.5);
        deckShape.lineTo(-1.8, 0.5);
        deckShape.lineTo(-2.0, 0.4);
        deckShape.closePath();

        // depth를 1.2로 늘려 데크 너비를 확장 (바퀴를 덮도록)
const extrudeSettings = { 
    depth: 0.8,           // 데크의 폭(두께)을 줄임
    bevelEnabled: true, 
    bevelThickness: 0.02, // 베벨 두께를 얇게 하여 더 날렵하게
    bevelSize: 0.03 
};        const deckGeo = new THREE.ExtrudeGeometry(deckShape, extrudeSettings);
const deckMat = new THREE.MeshStandardMaterial({ 
    color: 0x111111,
    emissive: 0x222222,
    metalness: 0.9, 
    roughness: 0.1,
    transparent: true,    // 투명 모드 활성화
    opacity: 0.6          // 0.0(완전 투명) ~ 1.0(불투명) 사이 조정
});        const deck = new THREE.Mesh(deckGeo, deckMat);
        deck.position.set(0, 0, -0.4); // 너비 확장 후 중앙 정렬
        boardGroup.add(deck);

        // 바퀴 (데크 안쪽으로 정렬)
        const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.15, 32);
const wheelMat = new THREE.MeshStandardMaterial({ 
    color: 0xffffff,
    transparent: true,
    opacity: 0.8 
});        const truckGeo = new THREE.BoxGeometry(0.1, 0.35, 0.8);
        const truckMat = new THREE.MeshStandardMaterial({ color: 0x555555 });

        [[-1.2, 0], [1.2, 0]].forEach(pos => {
            const truck = new THREE.Mesh(truckGeo, truckMat);
            truck.position.set(pos[0], -0.05, 0);
            boardGroup.add(truck);
            for(let z of [0.35, -0.35]) {
                const w = new THREE.Mesh(wheelGeo, wheelMat);
                w.rotation.x = Math.PI / 2;
                w.position.set(pos[0], -0.2, z);
                boardGroup.add(w);
            }
        });

        boardGroup.position.y = 4.3; 
        boardGroup.rotation.z = Math.PI / 9; 
        boardGroup.rotation.y = -Math.PI / 5;
        lightstick.add(boardGroup);

        // 5. 손잡이 섹션
        handleGroup = new THREE.Group();
        const connGeo = new THREE.CylinderGeometry(1.6, 1.4, 0.6, 32);
        const connMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const connector = new THREE.Mesh(connGeo, connMat);
        connector.position.y = 1.0;
        handleGroup.add(connector);

        const stickGeo = new THREE.CylinderGeometry(1.3, 1.1, 6.5, 32);
        const stickMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });
        const stick = new THREE.Mesh(stickGeo, stickMat);
        stick.position.y = -2.5;
        handleGroup.add(stick);

        const btnGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.1, 32);
        const btnMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const button = new THREE.Mesh(btnGeo, btnMat);
        button.rotation.x = Math.PI / 2;
        button.position.set(0, -1, 1.35);
        handleGroup.add(button);

        lightstick.add(handleGroup);
        lightstick.position.y = -1; // 화면 중앙 정렬을 위해 전체 하강

        window.addEventListener('resize', onWindowResize, false);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    let isKicking = false;

function animate() {
    requestAnimationFrame(animate);
    clock += 0.02;

    // 1. 마우스 위치에 따라 부드럽게 기울어짐 (반응형 흔들기)
    targetRotationY = mouseX * 0.5;
    targetRotationX = mouseY * 0.3;
    
    scene.rotation.y += (targetRotationY - scene.rotation.y) * 0.05;
    scene.rotation.x += (targetRotationX - scene.rotation.x) * 0.05;

    // 2. 기존 보드 애니메이션 유지 + 클릭 시 킥플립 효과
    boardGroup.position.y = 4.3 + Math.sin(clock * 1.5) * 0.3;
    if(isKicking) {
        boardGroup.rotation.z += 0.5; // 클릭 시 빠르게 회전
    }

    renderer.render(scene, camera);
}
</script>
</body>
</html>
