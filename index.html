<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KICKFLIP 3D PRO</title>
    <style>
        body { margin: 0; background: #ffffff; overflow: hidden; }
        canvas { display: block; }
        #info { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #888; pointer-events: none; }
    </style>
</head>
<body>

<div id="info">KICKFLIP OFFICIAL LIGHTSTICK CONCEPT</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    let scene, camera, renderer, boardGroup, globe, handleGroup;
    let clock = 0;

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1, 8);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- 조명 (세련된 금속 질감을 위해 다각도 배치) ---
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(5, 5, 5);
        scene.add(mainLight);

        const fillLight = new THREE.PointLight(0xffffff, 0.8);
        fillLight.position.set(-5, 0, 2);
        scene.add(fillLight);

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        // --- 1. 투명 구체 ---
        const globeGeo = new THREE.SphereGeometry(2, 64, 64);
        const globeMat = new THREE.MeshPhongMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.2,
            shininess: 100,
            specular: 0xffffff
        });
        globe = new THREE.Mesh(globeGeo, globeMat);
        scene.add(globe);

        // --- 2. 스케이트보드 (디테일 업그레이드) ---
        boardGroup = new THREE.Group();

        // 데크: 킥플립 포인트 (양끝이 살짝 들린 형태)
        const deckShape = new THREE.Shape();
        deckShape.moveTo(-1.2, 0);
        deckShape.quadraticCurveTo(0, -0.1, 1.2, 0); // 바닥 곡선
        deckShape.lineTo(1.4, 0.3); // 오른쪽 킥
        deckShape.lineTo(1.3, 0.4);
        deckShape.lineTo(-1.3, 0.4);
        deckShape.lineTo(-1.4, 0.3); // 왼쪽 킥
        deckShape.closePath();

        const extrudeSettings = { depth: 0.6, bevelEnabled: true, bevelThickness: 0.05, bevelSize: 0.05 };
        const deckGeo = new THREE.ExtrudeGeometry(deckShape, extrudeSettings);
        const deckMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.7, roughness: 0.2 });
        const deck = new THREE.Mesh(deckGeo, deckMat);
        deck.position.set(0, 0, -0.3);
        boardGroup.add(deck);

        // 바퀴 & 트럭 (실제 구조처럼 묘사)
        const wheelGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.1, 32);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const truckGeo = new THREE.BoxGeometry(0.1, 0.3, 0.5);
        const truckMat = new THREE.MeshStandardMaterial({ color: 0x555555 });

        const positions = [[-0.8, 0], [0.8, 0]];
        positions.forEach(pos => {
            const truck = new THREE.Mesh(truckGeo, truckMat);
            truck.position.set(pos[0], -0.05, 0);
            boardGroup.add(truck);

            const w1 = new THREE.Mesh(wheelGeo, wheelMat);
            w1.rotation.x = Math.PI / 2;
            w1.position.set(pos[0], -0.15, 0.25);
            boardGroup.add(w1);

            const w2 = new THREE.Mesh(wheelGeo, wheelMat);
            w2.rotation.x = Math.PI / 2;
            w2.position.set(pos[0], -0.15, -0.25);
            boardGroup.add(w2);
        });

        // 보드 초기 기울기 (튀어오르는 느낌)
        boardGroup.rotation.z = Math.PI / 10; 
        boardGroup.rotation.y = -Math.PI / 6;
        scene.add(boardGroup);

        // --- 3. 하단 웨이브 (부드러운 명암용) ---
        const waveGeo = new THREE.TorusGeometry(1.6, 0.15, 16, 100);
        const waveMat = new THREE.MeshPhongMaterial({ color: 0xdddddd, shininess: 30 });
        const wave = new THREE.Mesh(waveGeo, waveMat);
        wave.rotation.x = Math.PI / 2;
        wave.position.y = -1.3;
        scene.add(wave);

        // --- 4. 손잡이 전체 (Handle & Connector) ---
        handleGroup = new THREE.Group();

        // 커넥터 (체크무늬 텍스처 대용으로 패턴 생성)
        const connGeo = new THREE.CylinderGeometry(1.1, 0.9, 0.4, 32);
        const connMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const connector = new THREE.Mesh(connGeo, connMat);
        connector.position.y = -2.1;
        handleGroup.add(connector);

        // 손잡이 본체
        const stickGeo = new THREE.CylinderGeometry(0.8, 0.7, 3.5, 32);
        const stickMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.5 });
        const stick = new THREE.Mesh(stickGeo, stickMat);
        stick.position.y = -4;
        handleGroup.add(stick);

        // 버튼
        const btnGeo = new THREE.SphereGeometry(0.15, 16, 16);
        const btnMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const button = new THREE.Mesh(btnGeo, btnMat);
        button.position.set(0, -3.2, 0.8);
        handleGroup.add(button);

        scene.add(handleGroup);

        window.addEventListener('resize', onWindowResize, false);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        clock += 0.02;

        // 붕 떠오르며 튀어오르는 애니메이션 (y축 이동 + 미세한 흔들림)
        boardGroup.position.y = Math.sin(clock) * 0.25;
        boardGroup.rotation.x = Math.sin(clock * 0.5) * 0.1;
        
        // 구체 내부 글리터 느낌을 위한 미세한 회전
        globe.rotation.y += 0.002;

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
