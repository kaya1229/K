<!DOCTYPE html>
<html>
<head>
<style>
  :root {
    --stick-color: #1a1a1a;
    --check-pattern: #ddd;
  }

  body {
    background: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  /* 전체 컨테이너 */
  .lightstick {
    position: relative;
    width: 200px;
    height: 450px;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.5s;
    cursor: pointer;
  }

  .lightstick:hover {
    transform: rotateY(30deg) rotateX(10deg);
  }

  /* 1. 상단 투명 구체 */
  .head-globe {
    width: 180px;
    height: 180px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(2px);
    position: relative;
    box-shadow: inset -10px -10px 30px rgba(0,0,0,0.1), 0 10px 20px rgba(0,0,0,0.1);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    z-index: 2;
  }

  /* 2. 내부 스케이트보드 (간략화) */
  .skateboard {
    width: 120px;
    height: 30px;
    background: #333;
    border-radius: 10px;
    position: absolute;
    transform: rotate(-15deg);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }
  
  .skateboard::after {
    content: 'KICKFLIP';
    color: white;
    font-size: 10px;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
  }

  /* 3. 체크무늬 연결부 */
  .connector {
    width: 120px;
    height: 25px;
    background-color: white;
    background-image: 
      linear-gradient(45deg, #000 25%, transparent 25%), 
      linear-gradient(-45deg, #000 25%, transparent 25%), 
      linear-gradient(45deg, transparent 75%, #000 75%), 
      linear-gradient(-45deg, transparent 75%, #000 75%);
    background-size: 10px 10px;
    background-position: 0 0, 0 5px, 5px -5px, -5px 0px;
    margin-top: -15px;
    border-radius: 5px;
    z-index: 3;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  /* 4. 손잡이 */
  .handle {
    width: 80px;
    height: 200px;
    background: var(--stick-color);
    border-radius: 0 0 40px 40px;
    margin-top: -5px;
    box-shadow: inset 10px 0 20px rgba(255,255,255,0.05);
    position: relative;
  }

  /* 버튼 디테일 */
  .button {
    width: 15px;
    height: 15px;
    background: #444;
    border-radius: 50%;
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    border: 1px solid #555;
  }
</style>
</head>
<body>

<div class="lightstick">
  <div class="head-globe">
    <div class="skateboard"></div>
  </div>
  <div class="connector"></div>
  <div class="handle">
    <div class="button"></div>
  </div>
</div>

</body>
</html>
